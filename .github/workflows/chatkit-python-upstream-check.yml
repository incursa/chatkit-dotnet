name: ChatKit Python Upstream Check

on:
  schedule:
    - cron: "11 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-chatkit-python:
    runs-on: ubuntu-latest
    concurrency:
      group: chatkit-python-upstream-check
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Clone upstream chatkit-python
        run: git clone https://github.com/openai/chatkit-python.git "$GITHUB_WORKSPACE/_upstream/chatkit-python"

      - name: Check upstream translation state
        id: check
        shell: pwsh
        run: |
          $output = & ./tools/upstream-sync/Invoke-UpstreamSync.ps1 -CheckOnly -UpstreamPath "$env:GITHUB_WORKSPACE/_upstream/chatkit-python" 2>&1
          if ($LASTEXITCODE -ne 0) {
            $output
            exit $LASTEXITCODE
          }

          $jsonLine = $output | Where-Object { $_ -is [string] -and $_.StartsWith('{') } | Select-Object -Last 1
          if (-not $jsonLine) {
            throw 'The upstream check did not emit a JSON status payload.'
          }

          $state = $jsonLine | ConvertFrom-Json
          $summary = New-Object System.Text.StringBuilder
          [void]$summary.AppendLine('# ChatKit Python Upstream Check')
          [void]$summary.AppendLine()
          [void]$summary.AppendLine("**Status:** $($state.status)")

          if ($state.baseSha) {
            [void]$summary.AppendLine("**Base SHA:** $($state.baseSha)")
          }

          [void]$summary.AppendLine("**Latest SHA:** $($state.latestSha)")

          if ($state.status -eq 'updates-found') {
            [void]$summary.AppendLine()
            [void]$summary.AppendLine('New upstream commits are available. Run `tools/upstream-sync/Invoke-UpstreamSync.ps1` locally to translate and publish the update.')

            if ($state.commitLines) {
              [void]$summary.AppendLine()
              [void]$summary.AppendLine('## Commit Lines')
              foreach ($line in $state.commitLines) {
                [void]$summary.AppendLine("- $line")
              }
            }

            if ($state.changedFiles) {
              [void]$summary.AppendLine()
              [void]$summary.AppendLine('## Changed Files')
              foreach ($file in $state.changedFiles) {
                [void]$summary.AppendLine("- $file")
              }
            }
          } elseif ($state.status -eq 'bootstrap') {
            [void]$summary.AppendLine()
            [void]$summary.AppendLine('The check is bootstrapped on the current upstream head. A manual translation run will start from the next upstream change.')
          } else {
            [void]$summary.AppendLine()
            [void]$summary.AppendLine('No upstream Python changes are pending translation.')
          }

          $summary.ToString() | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8
