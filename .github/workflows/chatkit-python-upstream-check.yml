name: ChatKit Python Upstream Check

on:
  schedule:
    - cron: "11 3 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check-chatkit-python:
    runs-on: ubuntu-latest
    concurrency:
      group: chatkit-python-upstream-check
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Clone upstream chatkit-python
        run: git clone https://github.com/openai/chatkit-python.git "$GITHUB_WORKSPACE/_upstream/chatkit-python"

      - name: Check upstream translation state
        id: check
        shell: pwsh
        run: |
          $output = & ./tools/upstream-sync/Invoke-UpstreamSync.ps1 -CheckOnly -UpstreamPath "$env:GITHUB_WORKSPACE/_upstream/chatkit-python" 2>&1
          if ($LASTEXITCODE -ne 0) {
            $output
            exit $LASTEXITCODE
          }

          $jsonLine = $output | Where-Object { $_ -is [string] -and $_.StartsWith('{') } | Select-Object -Last 1
          if (-not $jsonLine) {
            throw 'The upstream check did not emit a JSON status payload.'
          }

          $state = $jsonLine | ConvertFrom-Json
          $statePath = Join-Path $env:GITHUB_WORKSPACE 'chatkit-python-upstream-state.json'
          $jsonLine | Out-File -FilePath $statePath -Encoding utf8
          "status=$($state.status)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "state_path=$statePath" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

          $summary = New-Object System.Text.StringBuilder
          [void]$summary.AppendLine('# ChatKit Python Upstream Check')
          [void]$summary.AppendLine()
          [void]$summary.AppendLine("**Status:** $($state.status)")

          if ($state.baseSha) {
            [void]$summary.AppendLine("**Base SHA:** $($state.baseSha)")
          }

          [void]$summary.AppendLine("**Latest SHA:** $($state.latestSha)")

          if ($state.status -eq 'updates-found') {
            [void]$summary.AppendLine()
            [void]$summary.AppendLine('New upstream commits are available. Run `tools/upstream-sync/Invoke-UpstreamSync.ps1` locally to translate and publish the update.')

            if ($state.commitLines) {
              [void]$summary.AppendLine()
              [void]$summary.AppendLine('## Commit Lines')
              foreach ($line in $state.commitLines) {
                [void]$summary.AppendLine("- $line")
              }
            }

            if ($state.changedFiles) {
              [void]$summary.AppendLine()
              [void]$summary.AppendLine('## Changed Files')
              foreach ($file in $state.changedFiles) {
                [void]$summary.AppendLine("- $file")
              }
            }
          } elseif ($state.status -eq 'bootstrap') {
            [void]$summary.AppendLine()
            [void]$summary.AppendLine('The check is bootstrapped on the current upstream head. A manual translation run will start from the next upstream change.')
          } else {
            [void]$summary.AppendLine()
            [void]$summary.AppendLine('No upstream Python changes are pending translation.')
          }

          $summary.ToString() | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8

      - name: Create upstream issue
        if: steps.check.outputs.status == 'updates-found'
        uses: actions/github-script@v8.0.0
        env:
          STATE_PATH: ${{ steps.check.outputs.state_path }}
        with:
          script: |
            const fs = require('node:fs');

            const state = JSON.parse(fs.readFileSync(process.env.STATE_PATH, 'utf8'));
            const shortSha = state.latestSha.slice(0, 7);
            const title = `ChatKit Python upstream update available: ${shortSha}`;
            const searchQuery = `repo:${context.repo.owner}/${context.repo.repo} is:issue is:open in:title "${title}"`;
            const search = await github.rest.search.issuesAndPullRequests({ q: searchQuery, per_page: 10 });

            if (search.data.total_count > 0) {
              core.info(`Issue already exists for ${state.latestSha}; skipping creation.`);
              return;
            }

            const commitLines = Array.isArray(state.commitLines) ? state.commitLines : [];
            const changedFiles = Array.isArray(state.changedFiles) ? state.changedFiles : [];
            const body = [
              '## Summary',
              '',
              'A new upstream `chatkit-python` change is available for review and translation.',
              '',
              '## Upstream Range',
              '',
              `- Base SHA: \`${state.baseSha ?? '(bootstrap)'}\``,
              `- Latest SHA: \`${state.latestSha}\``,
              '',
              '## Commits',
              '',
              ...(commitLines.length > 0 ? commitLines.map((line) => `- ${line}`) : ['- (no commit lines were reported)']),
              '',
              '## Changed Files',
              '',
              ...(changedFiles.length > 0 ? changedFiles.map((file) => `- ${file}`) : ['- (no changed files were reported)']),
              '',
              '## Review Request',
              '',
              '- Review the upstream diff against the included .NET surface in `docs/parity/manifest.md`.',
              '- If the change is in scope, create or update a focused work item in `docs/70-work/items/`.',
              '- If Copilot coding agent is available for this repository, assign this issue to Copilot so it can start the review/workflow automatically.',
              '',
              '## Notes',
              '',
              '- The daily upstream check workflow creates this issue automatically when new upstream commits are detected.',
              '- The issue body stays standardized so the review handoff is consistent.',
              '',
              'This issue was created automatically by the daily upstream check workflow.'
            ].join('\n');

            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body
            });

            core.info(`Created issue #${issue.data.number} for ${state.latestSha}.`);

            try {
              await github.rest.issues.addAssignees({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.data.number,
                assignees: ['copilot-swe-agent']
              });
              core.info(`Assigned issue #${issue.data.number} to Copilot.`);
            } catch (error) {
              const message = error instanceof Error ? error.message : String(error);
              core.warning(`Could not assign Copilot to issue #${issue.data.number}: ${message}`);
            }
